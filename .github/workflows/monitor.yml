name: 价格监控

on:
  schedule:
    # 每 30 分钟运行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 运行监控
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python monitor.py
